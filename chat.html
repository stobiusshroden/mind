<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hybrid Reservoir</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f1b2d;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 75%;
            white-space: pre-wrap;
        }

        .user {
            background-color: #1f2f4a;
            align-self: flex-end;
        }

        .assistant {
            background-color: #2c4db0;
            align-self: flex-start;
        }

        #loop-container {
            display: flex;
            gap: 8px;
            padding: 10px;
            background-color: #111f36;
            border-top: 1px solid #1f3557;
            flex-wrap: wrap;
            align-items: center;
        }

        #loop-objective {
            flex: 1;
            min-width: 260px;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
        }

        .loop-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background-color: #37598f;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .loop-btn:hover {
            background-color: #4c74b5;
        }

        #loop-status {
            width: 100%;
            color: #b8c8ef;
            font-size: 12px;
            white-space: pre-wrap;
        }

        #input-container {
            display: flex;
            padding: 10px;
            background-color: #0c1625;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }

        #send-btn {
            margin-left: 10px;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background-color: #3b6df0;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        #send-btn:hover {
            background-color: #5a82f7;
        }
    </style>
</head>
<body>

<div id="chat-container"></div>

<div id="loop-container">
    <input id="loop-objective" type="text" placeholder="Loop objective..." />
    <button class="loop-btn" id="loop-set-objective">Set Objective</button>
    <button class="loop-btn" id="loop-start">Start</button>
    <button class="loop-btn" id="loop-step">Step Once</button>
    <button class="loop-btn" id="loop-pause">Pause</button>
    <button class="loop-btn" id="loop-stop">Stop</button>
    <button class="loop-btn" id="loop-reset">Reset</button>
    <button class="loop-btn" id="loop-status-btn">Status</button>
    <div id="loop-status">[loop] idle</div>
</div>

<div id="input-container">
    <input id="user-input" type="text" placeholder="Speak calmly..." />
    <button id="send-btn">Send</button>
</div>

<script>
    const chatContainer = document.getElementById("chat-container");
    const inputField = document.getElementById("user-input");
    const sendButton = document.getElementById("send-btn");
    const loopObjective = document.getElementById("loop-objective");
    const loopStatus = document.getElementById("loop-status");

    let conversationHistory = [];

    // Stable client session id for tool-event SSE
    let sessionId = localStorage.getItem("hybrid_session_id");
    if (!sessionId) {
        sessionId = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
            (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
        );
        localStorage.setItem("hybrid_session_id", sessionId);
    }

    // Show backend versions
    async function loadVersions() {
        try {
            const baseUrl = window.location.origin;
            const [hv, bv] = await Promise.all([
                fetch(`${baseUrl}/version`).then(r => r.json()),
                fetch(`http://127.0.0.1:17171/version`).then(r => r.json())
            ]);
            dynastyBar.textContent = `[versions] hybrid=${hv.model} bridge_manifest=v${bv.manifestVersion}`;
        } catch (_) {
            // ignore
        }
    }

    // Live tool events
    function startEventStream() {
        const baseUrl = window.location.origin;
        const es = new EventSource(`${baseUrl}/v1/events?sessionId=${encodeURIComponent(sessionId)}`);

        es.addEventListener("ready", (e) => {
            // silent
        });

        function summarizeToolEvent(evtName, payload) {
            if (evtName === "tool") {
                const phase = payload.phase || "";
                const skill = payload.skill || "";
                const jid = payload.jobId ? ` jobId=${payload.jobId}` : "";
                if (phase === "invoke") return `[tool] invoking ${skill}${jid}`;
                if (phase === "started") return `[tool] started ${skill}${jid}`;
                if (phase === "finished") return `[tool] finished ${skill} (${payload.status})${jid}`;
                return `⟦tool⟧ ${skill} ${phase}`;
            }
            if (evtName === "bridge") {
                // Keep it quiet by default; uncomment next line to see raw bridge data.
                // return `⟦bridge⟧ ${JSON.stringify(payload)}`;
                return null;
            }
            return null;
        }

        es.addEventListener("tool", (e) => {
            try {
                const payload = JSON.parse(e.data);
                const line = summarizeToolEvent("tool", payload);
                if (line) addMessage("assistant", line);
            } catch (_) {}
        });

        es.addEventListener("bridge", (e) => {
            // default: suppressed
        });

        es.addEventListener("mark", (e) => {
            try {
                const payload = JSON.parse(e.data);
                addMessage("assistant", `[mark] ${payload.label}${payload.note ? ' — ' + payload.note : ''} (t=${payload.t ?? ''})`);
            } catch (_) {}
        });

        es.addEventListener("metrics", (e) => {
            // Metrics are high-volume; summarize lightly.
            try {
                const payload = JSON.parse(e.data);
                const inner = payload.metrics || payload.state || payload.data || payload;
                const m = inner.metrics || inner.state || inner;
                if (m && typeof m === 'object') {
                    const g = (m.gamma !== undefined) ? ` γ=${(m.gamma ?? 0).toFixed ? m.gamma.toFixed(6) : m.gamma}` : "";
                    const dg = (m.dgamma !== undefined) ? ` Δγ=${(m.dgamma ?? 0).toExponential ? m.dgamma.toExponential(2) : m.dgamma}` : "";
                    const er = (m.ema_rms !== undefined) ? ` eRMS=${(m.ema_rms ?? 0).toFixed ? m.ema_rms.toFixed(4) : m.ema_rms}` : "";
                    const line = `[dynasty] t=${m.t ?? ''} E=${(m.E ?? 0).toFixed ? m.E.toFixed(4) : m.E} RMS=${(m.rms ?? 0).toFixed ? m.rms.toFixed(4) : m.rms}${er}${g}${dg}`;
                    // Update a single status line to avoid DOM spam/lockups
                    dynastyBar.textContent = line;
                }
            } catch (_) {}
        });

        es.addEventListener("geometry", (e) => {
            try {
                const payload = JSON.parse(e.data);
                const base = payload.data || payload;
                const g = base.geometry || base;
                const pca = (g.pca_k !== undefined && g.pca_target !== undefined) ? `PCA@${Math.round((g.pca_target||0)*100)}%=${g.pca_k}` : null;
                const cd = (g.corr_dim !== undefined) ? `corrDim=${Number(g.corr_dim).toFixed(2)}` : null;
                const ns = (g.nSamples !== undefined) ? `n=${g.nSamples}` : null;
                const parts = [pca, cd, ns].filter(Boolean);
                if (parts.length) geometryBar.textContent = `[geometry] ${parts.join(' | ')}`;
            } catch (_) {}
        });

        es.addEventListener("multiway", (e) => {
            try {
                const payload = JSON.parse(e.data);
                const base = payload.data || payload;
                const m = base.multiway || base;
                const ev = (m.events !== undefined) ? `events=${m.events}` : null;
                const nodes = (m.nodes !== undefined) ? `nodes=${m.nodes}` : null;
                const edges = (m.edges !== undefined) ? `edges=${m.edges}` : null;
                const cap = (m.capped) ? 'capped' : null;
                const xi = (m.xiMax !== undefined && m.maxK !== undefined) ? `Ξmax=${m.xiMax}@k≤${m.maxK}` : null;
                const merges = (m.merges !== undefined) ? `merges=${m.merges}` : null;
                const paths = (m.pathsTotal !== undefined) ? `paths≈${m.pathsTotal}` : null;
                const H = (m.entropyMaxK !== undefined) ? `H=${Number(m.entropyMaxK).toFixed(2)}` : null;
                const peak = (m.peakMaxK !== undefined) ? `peak=${Number(m.peakMaxK).toFixed(2)}` : null;
                const cone = (m.coneMean !== undefined) ? `Ct=${JSON.stringify(m.coneMean)}` : null;
                const parts = [ev, nodes, edges, xi, merges, paths, H, peak, cone, cap].filter(Boolean);
                if (parts.length) multiwayBar.textContent = `[multiway] ${parts.join(' | ')}`;
            } catch (err) {
                multiwayBar.textContent = `[multiway] handler error: ${err}`;
            }
        });

        es.addEventListener("relay_pending", (e) => {
            try {
                const payload = JSON.parse(e.data);
                showRelay(payload);
            } catch (_) {
                showRelay(null);
            }
        });

        es.addEventListener("major_reply", (e) => {
            try {
                const payload = JSON.parse(e.data);
                const v = (payload && payload.verified) ? 'VERIFIED' : 'UNVERIFIED';
                const from = payload.from || 'Major-daemon';
                const text = payload.text || JSON.stringify(payload);
                addMessage("assistant", `[${from}→Tachikoma] (${v}) ${text}`);
            } catch (_) {
                addMessage("assistant", "[Major-daemon→Tachikoma] (reply received)");
            }
        });

        es.onerror = () => {
            // auto-reconnect is built-in; keep UI calm
        };
    }

    loadVersions();

    function addMessage(role, content) {
        const msg = document.createElement("div");
        msg.classList.add("message", role);
        msg.textContent = content;
        chatContainer.appendChild(msg);

        // cap message nodes to prevent lockups on high-frequency SSE
        const MAX_NODES = 400;
        while (chatContainer.children.length > MAX_NODES) {
            chatContainer.removeChild(chatContainer.firstChild);
        }

        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // A single-line live status bar for high-rate metrics
    const dynastyBar = document.createElement('div');
    dynastyBar.className = 'message assistant';
    dynastyBar.style.opacity = '0.85';

    // Geometry probe status line (low-rate)
    const geometryBar = document.createElement('div');
    geometryBar.className = 'message assistant';
    geometryBar.style.opacity = '0.75';
    geometryBar.textContent = '[geometry] (no probe yet)';

    // Multiway status line (low-rate)
    const multiwayBar = document.createElement('div');
    multiwayBar.className = 'message assistant';
    multiwayBar.style.opacity = '0.75';
    multiwayBar.textContent = '[multiway] (off)';

    dynastyBar.style.fontSize = '12px';
    dynastyBar.style.backgroundColor = '#203a82';
    dynastyBar.textContent = '[dynasty] (no metrics yet)';
    chatContainer.appendChild(multiwayBar);
    chatContainer.appendChild(geometryBar);
    chatContainer.appendChild(dynastyBar);

    // Prime multiway ticker from the current live JSON (avoids missing the first SSE burst)
    (async () => {
        try {
            multiwayBar.textContent = '[multiway] priming…';
            const r = await fetch(`/ui/out/openclaw_multiway_live.json?t=${Date.now()}`);
            if (r.ok) {
                const g = await r.json();
                const st = g.stats || {};
                const ev = (g.events) ? `events=${g.events.length}` : null;
                const nodes = (g.nodes) ? `nodes=${g.nodes.length}` : null;
                const edges = (g.edges) ? `edges=${g.edges.length}` : null;
                const xi = (st.xiMax !== undefined && st.maxK !== undefined) ? `Ξmax=${st.xiMax}@k≤${st.maxK}` : null;
                const merges = (st.merges !== undefined) ? `merges=${st.merges}` : null;
                const paths = (st.pathsTotal !== undefined) ? `paths≈${st.pathsTotal}` : null;
                const H = (st.entropyMaxK !== undefined) ? `H=${Number(st.entropyMaxK).toFixed(2)}` : null;
                const peak = (st.peakMaxK !== undefined) ? `peak=${Number(st.peakMaxK).toFixed(2)}` : null;
                const cone = (st.coneMean !== undefined) ? `Ct=${JSON.stringify(st.coneMean)}` : null;
                const cap = (g.capped) ? 'capped' : null;
                const parts = [ev, nodes, edges, xi, merges, paths, H, peak, cone, cap].filter(Boolean);
                if (parts.length) multiwayBar.textContent = `[multiway] ${parts.join(' | ')}`;
            }
        } catch (err) {
            multiwayBar.textContent = `[multiway] prime error: ${err}`;
        }
    })();

    // Start SSE only after status bars exist (prevents missed/ignored early events)
    startEventStream();

    // Relay badge (Tachikoma -> The Major outbox)
    let relayCount = 0;
    const relayBar = document.createElement('div');
    relayBar.className = 'message assistant';
    relayBar.style.opacity = '0.90';
    relayBar.style.fontSize = '12px';
    relayBar.style.backgroundColor = '#4a2b2b';
    relayBar.style.display = 'none';
    relayBar.textContent = '[relay]';
    chatContainer.appendChild(relayBar);

    function showRelay(payload) {
        relayCount += 1;
        const prev = (payload && payload.preview) ? payload.preview.replace(/\s+/g, ' ').slice(0, 120) : '';
        relayBar.style.display = 'block';
        relayBar.textContent = `[relay→Major] queued x${relayCount}` + (prev ? ` — "${prev}"` : '') + ` | tell The Major: check relay`;
    }

    async function sendCommand(text, trackInHistory = true) {
        if (!text) return null;
        if (trackInHistory) {
            addMessage("user", text);
            conversationHistory.push({ role: "user", content: text });
        }
        const baseUrl = window.location.origin;
        const response = await fetch(`${baseUrl}/v1/chat/completions`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId: sessionId, messages: conversationHistory })
        });
        if (!response.ok) throw new Error("Server error: " + response.status);
        const data = await response.json();
        const assistantReply = data.choices[0].message.content;
        addMessage("assistant", assistantReply);
        conversationHistory.push({ role: "assistant", content: assistantReply });
        return assistantReply;
    }

    async function sendMessage() {
        const userInput = inputField.value.trim();
        if (!userInput) return;
        inputField.value = "";
        try {
            await sendCommand(userInput, true);
        } catch (error) {
            console.error(error);
            addMessage("assistant", "No response received.");
        }
    }

    async function sendLoopCommand(cmd) {
        try {
            const reply = await sendCommand(cmd, true);
            loopStatus.textContent = `[loop] ${reply}`;
        } catch (error) {
            console.error(error);
            loopStatus.textContent = `[loop] error: ${error}`;
            addMessage("assistant", "No response received.");
        }
    }

    document.getElementById("loop-set-objective").addEventListener("click", () => {
        const text = (loopObjective.value || "").trim();
        if (!text) return;
        sendLoopCommand(`/loop objective ${text}`);
    });
    document.getElementById("loop-start").addEventListener("click", () => sendLoopCommand(`/loop start`));
    document.getElementById("loop-step").addEventListener("click", () => sendLoopCommand(`/loop step`));
    document.getElementById("loop-pause").addEventListener("click", () => sendLoopCommand(`/loop pause`));
    document.getElementById("loop-stop").addEventListener("click", () => sendLoopCommand(`/loop stop`));
    document.getElementById("loop-reset").addEventListener("click", () => sendLoopCommand(`/loop reset`));
    document.getElementById("loop-status-btn").addEventListener("click", () => sendLoopCommand(`/loop status`));

    sendButton.addEventListener("click", sendMessage);

    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
